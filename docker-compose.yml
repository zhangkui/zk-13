version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: leftover-food-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: leftover_food
      MYSQL_USER: leftover
      MYSQL_PASSWORD: leftover123
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - ./docker/mysql/data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
      - ./docker/mysql/conf/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - leftover-food-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leftover-food-backend
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: docker
      TZ: Asia/Shanghai
    ports:
      - "8080:8080"
    volumes:
      - ./backend/logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - leftover-food-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: leftover-food-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - leftover-food-network

networks:
  leftover-food-network:
    driver: bridge
